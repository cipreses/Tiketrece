name: CI Ticket System

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticket_system
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      env:
        DEBUG: "True"
        SECRET_KEY: "django-insecure-test-key-for-github-actions-ci-12345"
        DATABASE_URL: "postgres://postgres:postgres@localhost:5432/ticket_system"
        SUPERADMIN_EMAILS: "ti@13dejulio.edu.ar"
        GOOGLE_CLIENT_ID: "mock-client"
        GOOGLE_CLIENT_SECRET: "mock-secret"
        REDIRECT_URI: "http://localhost:8000/auth/callback/"
        ENABLE_MOCK_AUTH: "True"
      run: |
        pytest
